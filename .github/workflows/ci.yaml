name: wf-ci
on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
  push:
    branches:
      - develop
jobs:
  linting-Job:
    runs-on: ubuntu-latest
    steps:
      -  name: Welcome step
         run: echo "Welcome to Pipeline"
      - name: Clone Repo on Runner
        uses: actions/checkout@v4
      - name: Repo Information
        run: |
          git branch
          echo "Event Name: ${{github.event_name}}"
          echo "Actor ${{github.actor}}"
